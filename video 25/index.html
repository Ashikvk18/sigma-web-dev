<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>styling list</title>
    <style>
        nav ul li{
            list-style: devanagari;
            list-style-type: ""; /* Devanagari digit one */
            background-color: lemonchiffon;
            list-style-position: inside;
            border: 2px solid black;
            /* list-style-image: url(https://image2url.com/images/1758674329193-49761367-53d3-4a0c-b08b-f7e633537726.jpeg); */
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li>home</li>
            <li>about</li>
            <li>contact</li>
        </ul>
    </nav>

</body>

</html>
