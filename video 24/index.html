<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows and outlines</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow: 10px 10px 5px rgb(24, 158, 194);
        }
        .text-shadow{
            text-shadow: 2px 2px 4px rgba(215, 18, 172, 0.687);
            outline: 2px solid red;
            border: 2px solid black;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <p class="text-shadow">
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Eveniet dolorem quod, neque a necessitatibus quae deserunt unde expedita doloremque adipisci soluta, incidunt similique laborum deleniti ipsum. Reprehenderit corporis quos, est voluptas voluptate fugiat pariatur.
    </p>
    
</body>
</html>
