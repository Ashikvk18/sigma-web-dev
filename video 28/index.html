<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css position</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            background-color: rgb(208, 56, 168);
        }
        .box2{
            background-color: rgb(84, 187, 221);
            position: relative;
            top: -90px;
            left: 100px;
            z-index: -1;
        }
        .box3{
            background-color: green;
            position: relative;
        }
        .box4{
            background-color: yellow;
        }
        .box{
            height: 133px;
            width: 80vw;
            margin: 3px;
            padding: 3px;
            border: 2px solid black;
        }

    </style>
</head>
<body>
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>

   
</body>
</html>
